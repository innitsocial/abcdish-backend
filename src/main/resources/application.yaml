spring:
  application:
    name: abcdish-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jackson:
    serialization:
      indent-output: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:abcdish-local-dev-secret-key-must-be-at-least-32-characters}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

  oauth:
    base-authorization-url: ${OAUTH_BASE_AUTHORIZATION_URL:/oauth2/authorization}
