spring:
  datasource:
    url: jdbc:postgresql://db.ooqgsiyywjdouupwsmkx.supabase.co:5432/postgres
    username: postgres
    password: Classical@Music@1981
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: false

    properties:
      hibernate:
        format_sql: false
        default_schema: abcdish

  flyway:
    enabled: true
    schemas: abcdish
    default-schema: abcdish
    baseline-on-migrate: true

logging:
  file:
    name: ${LOG_FILE:logs/abcdish-backend.log}
  level:
    root: info
    com.innitsocial.abcdish: info
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n"
    console: "%d{HH:mm:ss} %-5level [%X{correlationId}] %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
