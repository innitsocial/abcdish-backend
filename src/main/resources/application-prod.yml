spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: false

    properties:
      hibernate:
        format_sql: false
        default_schema: abcdish

logging:
  level:
    org.hibernate.SQL: info

flyway:
   enabled: true
   schemas: abcdish
   default-schema: abcdish
   baseline-on-migrate: true