spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: Panda
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    schemas: abcdish
    default-schema: abcdish
    baseline-on-migrate: true
    create-schemas: true
#locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true
        default_schema: abcdish

logging:
  level:
    org.flywaydb: debug
    org.hibernate.SQL: debug